<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 880px; margin: 2rem auto; padding: 0 1.5rem; color: #1f2933; line-height: 1.6; }
  header { border-bottom: 3px solid #2563eb; padding-bottom: 0.75rem; margin-bottom: 1.5rem; }
  h1 { margin: 0; font-size: 1.6rem; }
  .meta { color: #6b7280; font-size: 0.85rem; margin-top: 0.25rem; }
  h2 { margin-top: 2rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { border: 1px solid #d1d5db; padding: 0.5rem 0.65rem; text-align: left; vertical-align: top; }
  th { background: #f3f4f6; }
  code { background: #f3f4f6; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.9em; }
  pre { background: #f3f4f6; padding: 0.75rem; border-radius: 6px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  img { max-width: 100%; border: 1px solid #d1d5db; border-radius: 6px; margin: 0.5rem 0; }
  figure { margin: 1rem 0; }
  figcaption { color: #6b7280; font-size: 0.85rem; }
  .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
  .badge.high { background: #fee2e2; color: #b91c1c; }
  .badge.medium { background: #fef3c7; color: #b45309; }
  .badge.low { background: #dcfce7; color: #15803d; }
</style>
</head>
<body>
<header>
  <h1>{{TITLE}}</h1>
  <div class="meta">{{DATE}}</div>
</header>
{{CONTENT}}
</body>
</html>
